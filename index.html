<!DOCTYPE html>
<html>
<head>
<title>Aftab Movies Hub - Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* {margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth}
body{background:#141414;color:#fff;font-family:Arial}
.header{background:#000;padding:15px 5%;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;border-bottom:2px solid #E50914}
.logo{font-size:24px;color:#E50914;font-weight:bold}
.nav a{color:#fff;text-decoration:none;margin-left:20px;font-size:16px}
.nav a:hover{color:#E50914}
.menu-btn{display:none;font-size:28px;background:none;border:none;color:#fff;cursor:pointer}
section{padding:60px 5%}
h2{font-size:32px;color:#E50914;margin-bottom:30px;text-align:center}
.slider{position:relative;width:100%;height:60vh;overflow:hidden;border-radius:8px}
.slide{position:absolute;width:100%;height:100%;opacity:0;transition:opacity 1s}
.slide.active{opacity:1}
.slide img{width:100%;height:100%;object-fit:cover;filter:brightness(0.6)}
.slide-text{position:absolute;bottom:50px;left:5%}
.slide-text h1{font-size:48px;margin-bottom:10px;text-shadow:2px 2px 10px #000}
.slide-text p{font-size:18px;max-width:500px;text-shadow:1px 1px 5px #000}
.btn{padding:10px 15px;margin:10px 5px 15px;border-radius:4px;border:none;font-weight:bold;cursor:pointer}
.btn-red{background:#E50914;color:#fff}
.btn-red:hover{background:#b20710}
.footer{text-align:center;padding:20px;color:#777;font-size:14px;border-top:1px solid #333;margin-top:40px}
.footer a{color:#E50914;text-decoration:none;margin:0 8px}
@media(max-width:768px){
.nav{display:none;position:absolute;top:60px;left:0;width:100%;background:#000;padding:20px;text-align:center}
.nav.active{display:block}
.nav a{display:block;margin:15px 0}
.menu-btn{display:block}
.slider{height:40vh}
.slide-text h1{font-size:28px}
</style>
</head>
<body>
</head>
<body>

<!-- Header -->
<div class="header">
<div class="logo">🎬 Aftab Movies Hub</div>
<button class="menu-btn" onclick="toggleMenu()">☰</button>
<div class="nav" id="nav">
<a href="index.html">Home</a>
<a href="movies.html">Movies</a>
<a href="webseries.html">Web Series</a>
<a href="reviews.html">Reviews</a>
<a href="contact.html">Contact</a>
</div>
</div>

<!-- Slider Only on Home -->
<section>
<div class="slider">
<div class="slide active">
<img src="witcher-thumb.jpg" alt="The Witcher">
<div class="slide-text">
<h1>The Witcher Explained</h1>
<p>Understand 3 timelines in 1 minute</p>
<button class="btn btn-red" onclick="window.open('https://youtube.com/shorts/YOUR_SHORT_ID','_blank')">Watch on YouTube</button>
</div>
</div>
<div class="slide">
<img src="lucy-thumb.jpg" alt="Lucy">
<div class="slide-text">
<h1>Lucy 2014 Ending</h1>
<p>What happens at 100% brain capacity?</p>
<button class="btn btn-red" onclick="window.open('https://youtube.com/shorts/YOUR_SHORT_ID','_blank')">Watch on YouTube</button>
</div>
</div>
</div>
</section>

<div class="footer">
© 2026 Aftab Movies Hub | All Rights Reserved<br>
<a href="contact.html">Disclaimer</a> | <a href="contact.html">Privacy Policy</a> | <a href="contact.html">Contact Us</a>
</div>

<script src="script.js"></script>
</body>
</html>
