<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aftab Movies Hub</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{
  font-family:Arial; 
  background:#111; 
  color:white; 
  display:flex; 
  justify-content:center; 
  align-items:center; 
  min-height:100vh; 
  margin:0; 
  padding:20px
}
.box{
  background:#222; 
  padding:30px; 
  border-radius:10px; 
  width:320px; 
  text-align:center
}
input{
  width:90%; 
  padding:10px; 
  margin:10px 0; 
  border:none; 
  border-radius:5px; 
  background:#333; 
  color:white
}
button{
  width:95%; 
  padding:12px; 
  background:red; 
  color:white; 
  border:none; 
  border-radius:5px; 
  cursor:pointer; 
  font-weight:bold; 
  font-size:16px
}
a{color:skyblue; cursor:pointer}
#videos{display:none; text-align:center; width:100%}
.video{margin:20px auto}
h2{color:red}
</style>
</head>
<body>

<div class="box" id="authBox">
  <h2>🎬 Aftab Movies Hub</h2>
  <div id="loginForm">
    <h3>Login</h3>
    <input type="email" id="loginEmail" placeholder="Enter Email">
    <input type="password" id="loginPass" placeholder="Enter Password">
    <button onclick="login()">Login</button>
    <p>Don't have an account? <a onclick="showSignup()">Sign Up</a></p>
  </div>
  
  <div id="signupForm" style="display:none">
    <h3>Sign Up</h3>
    <input type="email" id="signupEmail" placeholder="Enter Email">
    <input type="password" id="signupPass" placeholder="Enter Password">
    <button onclick="signup()">Sign Up</button>
    <p>Already have an account? <a onclick="showLogin()">Login</a></p>
  </div>
</div>

<div id="videos">
  <h1>🎬 Welcome to Aftab Movies Hub</h1>
  <button onclick="logout()" style="background:gray">Logout</button>
  
  <div class="video">
    <h3>Video 1</h3>
    <iframe width="320" height="200" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
  </div>
  
  <div class="video">
    <h3>Video 2</h3>
    <iframe width="320" height="200" src="https://www.youtube.com/embed/3JZ_D3ELwOQ" frameborder="0" allowfullscreen></iframe>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://ehymzqskttxsbaffjdui.supabase.co'
const SUPABASE_ANON_KEY = sb_publishable_izb6J9dvLLcpRrTiZkGodg_-tcdiDD_

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

function showSignup(){ 
  document.getElementById('loginForm').style.display='none'; 
  document.getElementById('signupForm').style.display='block' 
}
function showLogin(){ 
  document.getElementById('signupForm').style.display='none'; 
  document.getElementById('loginForm').style.display='block' 
}

async function signup(){
  const email = document.getElementById('signupEmail').value
  const password = document.getElementById('signupPass').value
  const { error } = await supabase.from('users').insert([{ email: email, password: password }])
  if(error){ 
    alert('Error: ' + error.message) 
  }
  else{ 
    alert('Sign Up Successful! Please Login'); 
    showLogin() 
  }
}

async function login(){
  const email = document.getElementById('loginEmail').value
  const password = document.getElementById('loginPass').value
  const { data, error } = await supabase.from('users').select('*').eq('email', email).eq('password', password)
  if(data && data.length > 0){ 
    document.getElementById('authBox').style.display='none'; 
    document.getElementById('videos').style.display='block'
  }
  else{ 
    alert('Invalid Email or Password') 
  }
}

function logout(){
  document.getElementById('authBox').style.display='block'; 
  document.getElementById('videos').style.display='none'
}
</script>

</body>
</html>
